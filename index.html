<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Asset</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Courier New', monospace;
    }

    .container {
      text-align: center;
    }

    .logo-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 32px 48px;
      display: inline-block;
      box-shadow: 0 0 60px rgba(100, 230, 210, 0.15);
    }

    .logo-wrap img {
      max-width: 480px;
      width: 100%;
      display: block;
    }

    .url-box {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .url-box code {
      background: #1a1a1a;
      color: #64e6d2;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      letter-spacing: 0.3px;
      word-break: break-all;
      max-width: 520px;
    }

    .copy-btn {
      background: #64e6d2;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .copy-btn:hover { opacity: 0.8; }

    .hint {
      margin-top: 14px;
      color: #444;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <img id="logo" src="/image/horizontal1.png" alt="Logo">
    </div>

    <div class="url-box">
      <code id="img-url">—</code>
      <button class="copy-btn" onclick="copyUrl()">COPIAR</button>
    </div>

    <p class="hint">use esta URL como src da imagem no seu projeto</p>
  </div>

  <script>
    // Monta a URL pública da imagem baseada na localização atual da página
    const base = window.location.href.replace(/\/[^/]*$/, '');
    const url = base + '/horizontal1.png';
    document.getElementById('img-url').textContent = url;

    function copyUrl() {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'COPIADO ✓';
        setTimeout(() => btn.textContent = 'COPIAR', 2000);
      });
    }
  </script>
</body>
</html>
